# Ansible Inventory for Task 37 NETCONF Automation
# Dit file definieert de devices en hun verbindingsinformatie

[cisco_devices]
csr1000v ansible_host=192.168.19.139

[cisco_devices:vars]
# Cisco IOS-XE device credentials
ansible_user=admin
ansible_password=123
ansible_connection=netconf
ansible_network_os=ios
ansible_port=830

# NETCONF specific settings
ansible_netconf_timeout=30

# Device variables
device_name=NETCONF-Router-PE
device_ospf_id=1
device_mgmt_interface=GigabitEthernet1

# GitHub configuration (for documentation)
github_repo=https://github.com/Fedor-Goossens-pxl/lab-8-2-automation
github_branch=main
task_number=37

[all:vars]
# Global variables
ansible_python_interpreter=/usr/bin/python3
