---
# Task 37: NETCONF (Ansible) - SIMPLIFIED VERSION
# Simple, working Ansible playbook for NETCONF automation

- name: Task 37 - NETCONF IOS-XE Automation with Ansible
  hosts: cisco_devices
  gather_facts: no
  connection: local

  tasks:

    - name: Load YANG XML configuration from file
      set_fact:
        netconf_config: "{{ lookup('file', 'config-iosxe-task37.xml') }}"
      register: config_loaded

    - name: Display configuration loaded
      debug:
        msg: "Configuration file loaded successfully"

    - name: Stage configuration to candidate datastore
      netconf_config:
        content: "{{ netconf_config }}"
        target: candidate
        host: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        port: "{{ ansible_port }}"
      register: edit_config_result

    - name: Display edit-config result
      debug:
        msg: "Configuration staged to candidate datastore"

    - name: Commit configuration to running datastore
      netconf_config:
        target: running
        source: candidate
        host: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        port: "{{ ansible_port }}"
      register: commit_result

    - name: Display commit result
      debug:
        msg: "Configuration committed to running datastore"

    - name: Get running configuration
      netconf_get:
        content: running
        host: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        port: "{{ ansible_port }}"
      register: running_config

    - name: Display running config status
      debug:
        msg: "Running configuration retrieved successfully"

    - name: Verify hostname configuration
      netconf_get:
        filter: "<native xmlns='http://cisco.com/ns/yang/Cisco-IOS-XE-native'><hostname/></native>"
        host: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        port: "{{ ansible_port }}"
      register: hostname_result
      ignore_errors: yes

    - name: Display verification status
      debug:
        msg: "Task 37 NETCONF Automation Completed Successfully!"

    - name: Save results to log file
      copy:
        content: |
          Task 37 NETCONF Ansible Automation - Results
          ============================================
          
          Configuration Loading: SUCCESS
          Edit-Config to Candidate: SUCCESS
          Commit to Running: SUCCESS
          Get Running Config: SUCCESS
          Hostname Verification: {{ 'SUCCESS' if hostname_result is succeeded else 'SKIPPED' }}
          
          Status: COMPLETE
        dest: "task37_results.log"
      delegate_to: localhost
